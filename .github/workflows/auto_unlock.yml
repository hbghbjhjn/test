name: Auto HyperOS Unlocker

on:
  schedule:
    - cron: '59 23 * * *'  # Runs at 23:59 UTC every day
  workflow_dispatch:

jobs:
  run_unlocker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install urllib3 colorama

      - name: Run the unlocker script
        run: |
          python auto_unlocker.py
        env:
          COOKIE_VALUE: ${{ secrets.COOKIE_VALUE }}
